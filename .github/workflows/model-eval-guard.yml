name: Model Eval Guard

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run unified model eval
        run: |
          python tools/evaluation/run_model_eval.py

      - name: Verify prediction lock
        run: |
          python tools/evaluation/verify_prediction_lock.py

      - name: Verify frozen manifest
        run: |
          python tools/evaluation/verify_frozen_manifest.py

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build
